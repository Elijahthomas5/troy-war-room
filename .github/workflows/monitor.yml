name: Troy War Room — Price Monitor

on:
  schedule:
    # Fixed intraday touchpoints (9:30/10:30/11:30/12:30/1:30/2:30/3:30/4:00 ET),
    # Mon–Fri. Cron itself is UTC-only and can't shift for daylight saving, so
    # each ET touchpoint gets TWO triggers below — one for EDT (UTC-4) and one
    # for EST (UTC-5). Whichever one doesn't match real Eastern time is a
    # deliberate no-op: troy-monitor.py checks the true ET time via Python's
    # zoneinfo (which has the actual DST transition dates, and is what stays
    # correct automatically) and skips any firing that isn't a real touchpoint.
    # Net effect: this self-corrects across the DST changeover with no manual
    # edits, ever. See TOUCHPOINTS_ET in troy-monitor.py for the source of truth.
    - cron: '30 13 * * 1-5'   # 9:30 AM ET during EDT
    - cron: '30 14 * * 1-5'   # 9:30 AM ET during EST / 10:30 AM ET during EDT
    - cron: '30 15 * * 1-5'   # 10:30 AM ET during EST / 11:30 AM ET during EDT
    - cron: '30 16 * * 1-5'   # 11:30 AM ET during EST / 12:30 PM ET during EDT
    - cron: '30 17 * * 1-5'   # 12:30 PM ET during EST / 1:30 PM ET during EDT
    - cron: '30 18 * * 1-5'   # 1:30 PM ET during EST / 2:30 PM ET during EDT
    - cron: '30 19 * * 1-5'   # 2:30 PM ET during EST / 3:30 PM ET during EDT
    - cron: '30 20 * * 1-5'   # 3:30 PM ET during EST
    - cron: '0  20 * * 1-5'   # 4:00 PM ET during EDT — market close
    - cron: '0  21 * * 1-5'   # 4:00 PM ET during EST — market close
  workflow_dispatch:   # lets you trigger manually from GitHub anytime — always runs in full, bypassing the touchpoint gate
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated HTML back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt beautifulsoup4

      - name: Run price monitor + send alerts
        env:
          EYL_EMAIL:    ${{ secrets.EYL_EMAIL }}
          EYL_PASSWORD: ${{ secrets.EYL_PASSWORD }}
        run: python troy-monitor.py

      - name: Commit updated prices + any new stock cards to repo
        run: |
          git config user.name  "Troy War Room Bot"
          git config user.email "bot@troy-war-room.local"
          echo "=== PRICES_AS_OF in HTML ==="
          grep -o "PRICES_AS_OF = '[^']*'" troy-options-tracker.html | head -1
          echo "=== git status ==="
          git status --short
          git add troy-options-tracker.html troy-classes.json .troy-state.json || true
          echo "=== git diff --stat ==="
          git diff --staged --stat
          git diff --staged --quiet || git commit -m "prices: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
