name: Troy War Room — Price Monitor

on:
  schedule:
    # Fixed EST (UTC-5) touchpoints, Mon–Fri. One cron per touchpoint — no DST logic needed.
    - cron: '30 14 * * 1-5'   #  9:30 AM EST
    - cron: '30 15 * * 1-5'   # 10:30 AM EST
    - cron: '30 16 * * 1-5'   # 11:30 AM EST
    - cron: '30 17 * * 1-5'   # 12:30 PM EST
    - cron: '30 18 * * 1-5'   #  1:30 PM EST
    - cron: '30 19 * * 1-5'   #  2:30 PM EST
    - cron: '30 20 * * 1-5'   #  3:30 PM EST
    - cron: '0  21 * * 1-5'   #  4:00 PM EST — market close
  workflow_dispatch:   # lets you trigger manually from GitHub anytime — always runs in full, bypassing the touchpoint gate
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated HTML back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt beautifulsoup4

      - name: Run price monitor + send alerts
        env:
          EYL_EMAIL:      ${{ secrets.EYL_EMAIL }}
          EYL_PASSWORD:   ${{ secrets.EYL_PASSWORD }}
          TRADIER_TOKEN:  ${{ secrets.TRADIER_TOKEN }}
        run: python troy-monitor.py

      - name: Commit updated prices + any new stock cards to repo
        run: |
          git config user.name  "Troy War Room Bot"
          git config user.email "bot@troy-war-room.local"
          git add troy-options-tracker.html troy-classes.json
          git add .troy-state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "prices: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            # Retry push up to 3x — a code push landing mid-run causes rejection
            for i in 1 2 3; do
              git push && break
              echo "Push rejected (attempt $i/3) — rebasing onto latest remote..."
              git pull --rebase
            done
          fi
