name: Troy's War Room Monitor

on:
  schedule:
    # Runs Mon–Fri every hour during market hours
    # GitHub Actions cron is UTC. ET (summer) = UTC-4
    - cron: '31 13 * * 1-5'   # 9:31 AM ET
    - cron: '31 14 * * 1-5'   # 10:31 AM ET
    - cron: '31 15 * * 1-5'   # 11:31 AM ET
    - cron: '31 16 * * 1-5'   # 12:31 PM ET
    - cron: '31 17 * * 1-5'   # 1:31 PM ET
    - cron: '31 18 * * 1-5'   # 2:31 PM ET
    - cron: '31 19 * * 1-5'   # 3:31 PM ET

  workflow_dispatch:   # Manual "Run workflow" button in GitHub

permissions:
  contents: write    # Needed to commit updated HTML back

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run monitor
        run: python3 troy-monitor.py
        env:
          EYL_EMAIL:    ${{ secrets.EYL_EMAIL }}
          EYL_PASSWORD: ${{ secrets.EYL_PASSWORD }}

      - name: Commit updated dashboard
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add troy-options-tracker.html .troy-state.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "🔄 Auto-update $(TZ='America/New_York' date '+%b %d %I:%M %p ET')"
          git push
